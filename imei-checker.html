<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMEI Checker</title>
  <style>
    :root {
      --bg: #0a0d14;
      --card: #161c2d;
      --border: #1f2a40;
      --text: #e8eaf0;
      --muted: #8b96ad;
      --ok: #00e5a0;
      --bad: #ff4757;
      --blue: #3d9bff;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .app {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }
    label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #111520;
      color: var(--text);
      font-size: 18px;
      padding: 13px 14px;
      outline: none;
    }
    input:focus { border-color: var(--blue); }
    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { background: var(--blue); color: #fff; }
    .ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .result {
      margin-top: 18px;
      background: #111520;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      line-height: 1.5;
      font-size: 14px;
    }
    .result b { color: var(--text); }
    .ok { color: var(--ok); font-weight: 700; }
    .bad { color: var(--bad); font-weight: 700; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>IMEI Checker</h1>
    <p class="sub">Validate a 15-digit IMEI or generate the check digit from the first 14 digits.</p>

    <label for="imeiInput">Enter IMEI</label>
    <input id="imeiInput" type="text" inputmode="numeric" placeholder="e.g. 356938035643809" maxlength="20">
    <div class="hint" id="lengthHint">Digits: 0</div>

    <div class="row">
      <button class="primary" id="checkBtn">Check IMEI</button>
      <button class="ghost" id="clearBtn" type="button">Clear</button>
      <button class="ghost" id="sampleBtn" type="button">Try Sample</button>
    </div>

    <section class="result" id="resultBox">
      Enter an IMEI to begin.
    </section>

    <p class="note">This only validates IMEI structure/check digit (Luhn). It does not check blacklist/stolen status.</p>
  </main>

  <script>
    const input = document.getElementById('imeiInput');
    const resultBox = document.getElementById('resultBox');
    const lengthHint = document.getElementById('lengthHint');

    function digitsOnly(value) {
      return String(value || '').replace(/\D/g, '');
    }

    function luhnCheck(numberString) {
      let sum = 0;
      let doubleDigit = false;
      for (let i = numberString.length - 1; i >= 0; i -= 1) {
        let digit = Number(numberString[i]);
        if (doubleDigit) {
          digit *= 2;
          if (digit > 9) digit -= 9;
        }
        sum += digit;
        doubleDigit = !doubleDigit;
      }
      return sum % 10 === 0;
    }

    function computeCheckDigit(imei14) {
      for (let d = 0; d <= 9; d += 1) {
        const candidate = imei14 + String(d);
        if (luhnCheck(candidate)) return d;
      }
      return null;
    }

    function renderResult() {
      const digits = digitsOnly(input.value);
      lengthHint.textContent = `Digits: ${digits.length}`;

      if (!digits) {
        resultBox.textContent = 'Enter an IMEI to begin.';
        return;
      }

      if (digits.length < 14 || digits.length > 15) {
        resultBox.innerHTML = `<span class="bad">Invalid length.</span><br>IMEI should be 15 digits, or 14 digits to generate the check digit.<br><span class="mono">${digits}</span>`;
        return;
      }

      if (digits.length === 14) {
        const checkDigit = computeCheckDigit(digits);
        const fullImei = digits + String(checkDigit);
        resultBox.innerHTML = `<span class="ok">Check digit generated.</span><br><b>Full IMEI:</b> <span class="mono">${fullImei}</span><br><b>TAC:</b> <span class="mono">${fullImei.slice(0, 8)}</span>  -  <b>SNR:</b> <span class="mono">${fullImei.slice(8, 14)}</span>  -  <b>CD:</b> <span class="mono">${fullImei.slice(14)}</span>`;
        return;
      }

      const valid = luhnCheck(digits);
      const expectedCheckDigit = computeCheckDigit(digits.slice(0, 14));
      if (valid) {
        resultBox.innerHTML = `<span class="ok">Valid IMEI.</span><br><b>IMEI:</b> <span class="mono">${digits}</span><br><b>TAC:</b> <span class="mono">${digits.slice(0, 8)}</span>  -  <b>SNR:</b> <span class="mono">${digits.slice(8, 14)}</span>  -  <b>CD:</b> <span class="mono">${digits.slice(14)}</span>`;
      } else {
        const suggested = `${digits.slice(0, 14)}${expectedCheckDigit}`;
        resultBox.innerHTML = `<span class="bad">Invalid IMEI check digit.</span><br><b>Entered:</b> <span class="mono">${digits}</span><br><b>Suggested:</b> <span class="mono">${suggested}</span>`;
      }
    }

    input.addEventListener('input', renderResult);
    document.getElementById('checkBtn').addEventListener('click', renderResult);
    document.getElementById('clearBtn').addEventListener('click', () => {
      input.value = '';
      renderResult();
      input.focus();
    });
    document.getElementById('sampleBtn').addEventListener('click', () => {
      input.value = '356938035643809';
      renderResult();
    });

    renderResult();
  </script>
</body>
</html>
